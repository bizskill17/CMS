name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Validate deploy secrets
        shell: bash
        env:
          HOSTINGER_DB_HOST: ${{ secrets.HOSTINGER_DB_HOST }}
          HOSTINGER_DB_NAME: ${{ secrets.HOSTINGER_DB_NAME || secrets.HOSTINGER_DB_DATABASE }}
          HOSTINGER_DB_USER: ${{ secrets.HOSTINGER_DB_USER || secrets.HOSTINGER_DB_USERNAME }}
          HOSTINGER_DB_PASSWORD: ${{ secrets.HOSTINGER_DB_PASSWORD }}
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_TARGET_DIR: ${{ secrets.HOSTINGER_TARGET_DIR }}
        run: |
          missing=()
          [[ -n "$HOSTINGER_DB_HOST" ]] || missing+=("HOSTINGER_DB_HOST")
          [[ -n "$HOSTINGER_DB_NAME" ]] || missing+=("HOSTINGER_DB_NAME or HOSTINGER_DB_DATABASE")
          [[ -n "$HOSTINGER_DB_USER" ]] || missing+=("HOSTINGER_DB_USER or HOSTINGER_DB_USERNAME")
          [[ -n "$HOSTINGER_DB_PASSWORD" ]] || missing+=("HOSTINGER_DB_PASSWORD")
          [[ -n "$HOSTINGER_FTP_SERVER" ]] || missing+=("HOSTINGER_FTP_SERVER")
          [[ -n "$HOSTINGER_FTP_USERNAME" ]] || missing+=("HOSTINGER_FTP_USERNAME")
          [[ -n "$HOSTINGER_FTP_PASSWORD" ]] || missing+=("HOSTINGER_FTP_PASSWORD")
          [[ -n "$HOSTINGER_TARGET_DIR" ]] || missing+=("HOSTINGER_TARGET_DIR")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Actions secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build frontend and deploy package
        run: npm run build:hostinger
        env:
          HOSTINGER_DB_HOST: ${{ secrets.HOSTINGER_DB_HOST }}
          HOSTINGER_DB_PORT: ${{ secrets.HOSTINGER_DB_PORT }}
          HOSTINGER_DB_NAME: ${{ secrets.HOSTINGER_DB_NAME || secrets.HOSTINGER_DB_DATABASE }}
          HOSTINGER_DB_USER: ${{ secrets.HOSTINGER_DB_USER || secrets.HOSTINGER_DB_USERNAME }}
          HOSTINGER_DB_PASSWORD: ${{ secrets.HOSTINGER_DB_PASSWORD }}
          HOSTINGER_DB_CHARSET: ${{ secrets.HOSTINGER_DB_CHARSET }}

      - name: Verify deploy DB config
        run: test -f deploy/api/config/database.php

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy files over FTP
        env:
          HOSTINGER_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_TARGET_DIR: ${{ secrets.HOSTINGER_TARGET_DIR }}
        run: |
          timeout 5m lftp -d -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "ftp://$HOSTINGER_SERVER" <<EOF
          set cmd:fail-exit yes
          set net:timeout 20
          set net:max-retries 1
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 5
          set xfer:clobber on
          set ftp:passive-mode yes
          set ftp:ssl-allow no
          set ssl:verify-certificate no
          mirror -R ./deploy/ "$HOSTINGER_TARGET_DIR" --verbose
          bye
          EOF
