name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE || 'https://cms.bizskilledu.com/api' }}

      - name: Prepare Hostinger package
        run: node scripts/prepare-hostinger-deploy.mjs
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CHARSET: ${{ secrets.DB_CHARSET }}
          APP_SUPER_ADMIN_ORGANIZATION_ID: ${{ secrets.APP_SUPER_ADMIN_ORGANIZATION_ID || 'Admin' }}
          APP_SUPER_ADMIN_LOGIN_ID: ${{ secrets.APP_SUPER_ADMIN_LOGIN_ID || 'bizskill' }}
          APP_SUPER_ADMIN_PASSWORD: ${{ secrets.APP_SUPER_ADMIN_PASSWORD || secrets.DB_PASSWORD }}
          APP_SUPER_ADMIN_FULL_NAME: ${{ secrets.APP_SUPER_ADMIN_FULL_NAME || 'Bizskill Admin' }}

      - name: Upload to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_FTP_PORT || 21 }}
          local-dir: ./deploy/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            api/public/uploads/**
          dangerous-clean-slate: false
