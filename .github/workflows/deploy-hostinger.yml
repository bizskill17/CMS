name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend and deploy package
        run: npm run build:hostinger
        env:
          HOSTINGER_DB_HOST: ${{ secrets.HOSTINGER_DB_HOST }}
          HOSTINGER_DB_PORT: ${{ secrets.HOSTINGER_DB_PORT }}
          HOSTINGER_DB_NAME: ${{ secrets.HOSTINGER_DB_NAME || secrets.HOSTINGER_DB_DATABASE }}
          HOSTINGER_DB_USER: ${{ secrets.HOSTINGER_DB_USER || secrets.HOSTINGER_DB_USERNAME }}
          HOSTINGER_DB_PASSWORD: ${{ secrets.HOSTINGER_DB_PASSWORD }}
          HOSTINGER_DB_CHARSET: ${{ secrets.HOSTINGER_DB_CHARSET }}

      - name: Verify deploy DB config
        run: test -f deploy/api/config/database.php

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy files over FTP
        shell: bash
        env:
          HOSTINGER_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_TARGET_DIR: ${{ secrets.HOSTINGER_TARGET_DIR }}
          HOSTINGER_PROTOCOL: ${{ secrets.HOSTINGER_FTP_PROTOCOL }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_FTP_PORT }}
        run: |
          if [ -z "${HOSTINGER_SERVER:-}" ] || [ -z "${HOSTINGER_USERNAME:-}" ] || [ -z "${HOSTINGER_PASSWORD:-}" ] || [ -z "${HOSTINGER_TARGET_DIR:-}" ]; then
            echo "FTP deploy secrets are missing. Check HOSTINGER_FTP_SERVER, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD, and HOSTINGER_TARGET_DIR." >&2
            exit 1
          fi

          port_part=""
          if [ -n "${HOSTINGER_PORT:-}" ]; then
            port_part=":$HOSTINGER_PORT"
          fi

          common_cmds="set cmd:fail-exit yes; set net:timeout 30; set net:max-retries 2; set net:reconnect-interval-base 5; set net:reconnect-interval-max 10; set xfer:clobber on; set ftp:passive-mode yes; set ssl:verify-certificate no;"

          attempt_deploy() {
            protocol="$1"
            target_scheme="$protocol"
            ssl_cmd="set ftp:ssl-allow no;"

            if [ "$protocol" = "ftps" ]; then
              target_scheme="ftp"
              ssl_cmd="set ftp:ssl-allow yes; set ftp:ssl-force yes;"
            fi

            target_url="${target_scheme}://$HOSTINGER_SERVER${port_part}"

            echo "Trying deploy with protocol: $protocol via $target_url"

            if [ "$protocol" = "ftps" ]; then
              timeout 8m lftp -d -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "$target_url" -e "$common_cmds $ssl_cmd mirror -R ./deploy/ \"$HOSTINGER_TARGET_DIR\" --verbose; bye"
            elif [ "$protocol" = "ftp" ]; then
              timeout 8m lftp -d -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "$target_url" -e "$common_cmds $ssl_cmd mirror -R ./deploy/ \"$HOSTINGER_TARGET_DIR\" --verbose; bye"
            else
              timeout 8m lftp -d -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "$target_url" -e "$common_cmds set sftp:auto-confirm yes; mirror -R ./deploy/ \"$HOSTINGER_TARGET_DIR\" --verbose; bye"
            fi
          }

          if [ -n "${HOSTINGER_PROTOCOL:-}" ]; then
            attempt_deploy "$HOSTINGER_PROTOCOL"
            exit 0
          fi

          attempt_deploy "ftps" || attempt_deploy "ftp" || attempt_deploy "sftp"
