name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend and deploy package
        run: npm run build:hostinger
        env:
          HOSTINGER_DB_HOST: ${{ secrets.HOSTINGER_DB_HOST }}
          HOSTINGER_DB_PORT: ${{ secrets.HOSTINGER_DB_PORT }}
          HOSTINGER_DB_NAME: ${{ secrets.HOSTINGER_DB_NAME || secrets.HOSTINGER_DB_DATABASE }}
          HOSTINGER_DB_USER: ${{ secrets.HOSTINGER_DB_USER || secrets.HOSTINGER_DB_USERNAME }}
          HOSTINGER_DB_PASSWORD: ${{ secrets.HOSTINGER_DB_PASSWORD }}
          HOSTINGER_DB_CHARSET: ${{ secrets.HOSTINGER_DB_CHARSET }}

      - name: Verify deploy DB config
        run: test -f deploy/api/config/database.php

      - name: Deploy files over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.HOSTINGER_TARGET_DIR }}
          port: ${{ secrets.HOSTINGER_FTP_PORT || '21' }}
          protocol: ftps
          timeout: 120000
