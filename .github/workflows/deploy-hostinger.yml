name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend and deploy package
        run: npm run build:hostinger
        env:
          HOSTINGER_DB_HOST: ${{ secrets.HOSTINGER_DB_HOST }}
          HOSTINGER_DB_PORT: ${{ secrets.HOSTINGER_DB_PORT }}
          HOSTINGER_DB_NAME: ${{ secrets.HOSTINGER_DB_NAME || secrets.HOSTINGER_DB_DATABASE }}
          HOSTINGER_DB_USER: ${{ secrets.HOSTINGER_DB_USER || secrets.HOSTINGER_DB_USERNAME }}
          HOSTINGER_DB_PASSWORD: ${{ secrets.HOSTINGER_DB_PASSWORD }}
          HOSTINGER_DB_CHARSET: ${{ secrets.HOSTINGER_DB_CHARSET }}

      - name: Verify deploy DB config
        run: test -f deploy/api/config/database.php

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy files over FTP
        shell: bash
        env:
          HOSTINGER_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_TARGET_DIR: ${{ secrets.HOSTINGER_TARGET_DIR }}
          HOSTINGER_PROTOCOL: ${{ secrets.HOSTINGER_FTP_PROTOCOL }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_FTP_PORT }}
        run: |
          if [ -z "${HOSTINGER_SERVER:-}" ] || [ -z "${HOSTINGER_USERNAME:-}" ] || [ -z "${HOSTINGER_PASSWORD:-}" ] || [ -z "${HOSTINGER_TARGET_DIR:-}" ]; then
            echo "FTP deploy secrets are missing. Check HOSTINGER_FTP_SERVER, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD, and HOSTINGER_TARGET_DIR." >&2
            exit 1
          fi

          protocol="${HOSTINGER_PROTOCOL:-ftps}"
          if [ "$protocol" != "ftps" ]; then
            echo "For this deployment workflow, use HOSTINGER_FTP_PROTOCOL=ftps." >&2
            exit 1
          fi

          port="${HOSTINGER_PORT:-21}"
          target_url="ftp://$HOSTINGER_SERVER:$port"

          echo "Trying deploy with protocol: ftps via $target_url"
          timeout 90s lftp -d -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "$target_url" -e "set cmd:fail-exit yes; set net:timeout 12; set net:max-retries 1; set net:reconnect-interval-base 3; set net:reconnect-interval-max 3; set xfer:clobber on; set ftp:passive-mode yes; set ftp:ssl-allow yes; set ftp:ssl-force yes; set ssl:verify-certificate no; mirror -R ./deploy/ \"$HOSTINGER_TARGET_DIR\" --verbose; bye"
