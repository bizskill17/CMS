name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend and deploy package
        run: npm run build:hostinger
        env:
          HOSTINGER_DB_HOST: ${{ secrets.HOSTINGER_DB_HOST }}
          HOSTINGER_DB_PORT: ${{ secrets.HOSTINGER_DB_PORT }}
          HOSTINGER_DB_NAME: ${{ secrets.HOSTINGER_DB_NAME }}
          HOSTINGER_DB_USER: ${{ secrets.HOSTINGER_DB_USER }}
          HOSTINGER_DB_PASSWORD: ${{ secrets.HOSTINGER_DB_PASSWORD }}
          HOSTINGER_DB_CHARSET: ${{ secrets.HOSTINGER_DB_CHARSET }}

      - name: Deploy files over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./deploy/
          server-dir: ${{ secrets.HOSTINGER_TARGET_DIR }}
          dangerous-clean-slate: false
